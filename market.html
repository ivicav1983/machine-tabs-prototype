<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Prototype</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", Arial, sans-serif; background: #f3f4f6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
const { useState, useRef, useEffect } = React;

const TABS = ["Overview", "Sales", "Transactions", "Events", "Refill", "Products", "Analysis", "Kiosks and stations"];

const MARKET_NAME = "G4Y Maksimir 2";
const STATIONS = [
  { id: "shelves1", name: "Shelves 1", description: "Lijevo od kioska",                    icon: "shelves" },
  { id: "shelves2", name: "Shelves 2", description: "Snacks pokraj frižidera",             icon: "shelves" },
  { id: "shelves3", name: "Shelves 3", description: "Jabuke i kruške, trešnje i grožđe",  icon: "shelves" },
  { id: "freezer1", name: "Freezer 1", description: "Sladoledi",                           icon: "freezer" },
];

// ════════════════ REFILL DATA ════════════════
const API_LIST = {
  content: {
    grouped_events_list: [
      { refill_count: 1, empty_facings: 4, date: "2026-03-09", stock_data: { product_stock: 91.3 }, filling_percentage: 78.4, location: "G4Y Maksimir 2" },
      { refill_count: 1, empty_facings: 5, date: "2026-03-03", stock_data: { product_stock: 86.06 }, filling_percentage: 62.1, location: "G4Y Maksimir 2" },
    ],
    avg_no_empties: 4.5, avg_fillings: 70.3, avg_stocks: 88.7, no_of_visits: 2,
  },
};
const API_DETAIL_LOGS = [
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 66, caption: "POLLEO SPORT L-CARNITINE 750ML ORANGE (1/12)", fill_type: 0, quantity_change: 2, quantity: 4, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 65, caption: "POLLEO SPORT BCAA 750ML ORANGE-LEMON-LIME (1/12)", fill_type: 0, quantity_change: 4, quantity: 4, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 63, caption: "POLLEO SPORT ISO DRINK 750ML LEMON (1/12)", fill_type: 0, quantity_change: 1, quantity: 5, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 62, caption: "POLLEO SPORT ISO DRINK 750ML LEMON (1/12)", fill_type: 0, quantity_change: 5, quantity: 5, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 62, caption: "POLLEO SPORT ISO DRINK 750ML LEMON (1/12)", fill_type: 2, quantity_change: 1, quantity: 5, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 62, caption: "POLLEO SPORT ISO DRINK 750ML LEMON (1/12)", fill_type: 1, quantity_change: -1, quantity: 4, max_quantity: 5, source: 1 },
  { timestamp: "2026-03-09T09:55:20.000Z", first_name: "Filip", column_index: 57, caption: "MONSTER ENERGY THE DOCTOR 0.5L (1/12)", fill_type: 0, quantity_change: 5, quantity: 5, max_quantity: 5, source: 1 },
];
const FILL_TYPE_MAP = { 0: "Filled", 1: "Corrected", 2: "Returned", 3: "Removed" };
const ACTION_CFG = {
  Filled:   { color: "#1a7a3e", bg: "#eaf7ef", border: "#b7e4c7", dot: "#2daa60", label: "Filled" },
  Corrected:{ color: "#b45309", bg: "#fff7ed", border: "#fcd79a", dot: "#f59e0b", label: "Corrected" },
  Removed:  { color: "#991b1b", bg: "#fef2f2", border: "#fca5a5", dot: "#ef4444", label: "Removed" },
  Returned: { color: "#6b7280", bg: "#f3f4f6", border: "#d1d5db", dot: "#9ca3af", label: "Returned to truck" },
};
function rDate(iso) { const d = new Date(iso); return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()}`; }
function rTime(iso) { const d = new Date(iso); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`; }
function groupLogs(logs) {
  const map = {};
  logs.forEach(l => {
    if (!map[l.column_index]) map[l.column_index] = { col: l.column_index, product: l.caption, maxStock: l.max_quantity, finalStock: l.quantity, actions: [] };
    map[l.column_index].actions.push({ action: FILL_TYPE_MAP[l.fill_type] || "Filled", qty: l.quantity_change });
    map[l.column_index].finalStock = l.quantity;
  });
  return Object.values(map).sort((a, b) => b.col - a.col);
}
const VISITS = API_LIST.content.grouped_events_list.map((item, i) => ({ id: i, refillNo: item.refill_count, date: rDate(item.date), rawDate: item.date, location: item.location, stockAfter: item.stock_data.product_stock, stockBefore: item.filling_percentage, positionsBelow: item.empty_facings }));
const SUMMARY = { avg_stocks: API_LIST.content.avg_stocks, avg_fillings: API_LIST.content.avg_fillings, avg_no_empties: API_LIST.content.avg_no_empties, no_of_visits: API_LIST.content.no_of_visits };
const DETAIL_BY_DATE = {
  "2026-03-09": [{ routeId: "r1", routeName: "Route Maksimir AM", filler: "f.sesvecan", confirmedAt: rTime("2026-03-09T09:55:20.000Z"), confirmedDate: rDate("2026-03-09T09:55:20.000Z"), positions: groupLogs(API_DETAIL_LOGS) }],
  "2026-03-03": [{ routeId: "r2", routeName: null, filler: "m.horvat", confirmedAt: "08:30:00", confirmedDate: "03.03.2026", positions: [
    { col: 66, product: "POLLEO SPORT L-CARNITINE 750ML ORANGE (1/12)", maxStock: 5, finalStock: 4, actions: [{ action: "Filled", qty: 2 }] },
    { col: 65, product: "POLLEO SPORT BCAA 750ML ORANGE-LEMON-LIME (1/12)", maxStock: 5, finalStock: 4, actions: [{ action: "Filled", qty: 4 }] },
    { col: 62, product: "POLLEO SPORT ISO DRINK 750ML LEMON (1/12)", maxStock: 5, finalStock: 4, actions: [{ action: "Filled", qty: 6 }, { action: "Removed", qty: -2 }, { action: "Corrected", qty: -1 }, { action: "Returned", qty: 2 }] },
  ]}],
};

function ActionBadge({ action }) {
  const c = ACTION_CFG[action] || ACTION_CFG.Filled;
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:c.bg, color:c.color, border:`1px solid ${c.border}`, padding:"1px 7px", borderRadius:20, fontSize:11, fontWeight:600, whiteSpace:"nowrap" }}>
      <span style={{ width:5, height:5, borderRadius:"50%", background:c.dot, flexShrink:0 }}/>
      {c.label}
    </span>
  );
}

function PositionRow({ pos, isLast }) {
  const primary = pos.actions.filter(a => a.action !== "Returned");
  const returned = pos.actions.filter(a => a.action === "Returned");
  const net = primary.reduce((s, a) => s + a.qty, 0);
  return (
    <div style={{ borderBottom: isLast ? "none" : "1px solid #f3f4f6" }}>
      <div style={{ display:"grid", gridTemplateColumns:"16px 52px 1fr 200px 70px 70px", alignItems:"center", padding:"10px 0", background:"white" }}>
        <div/>
        <div style={{ fontSize:13, fontWeight:700, color:"#c8000a", fontFamily:"monospace" }}>{pos.col}</div>
        <div style={{ fontSize:13, color:"#111827", fontWeight:500, paddingRight:12 }}>{pos.product}</div>
        <div>
          {primary.map((a, i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"2px 0" }}>
              <ActionBadge action={a.action}/>
              <span style={{ fontFamily:"monospace", fontSize:12, fontWeight:700, color: a.qty > 0 ? "#1a7a3e" : "#b45309" }}>{a.qty > 0 ? `+${a.qty}` : a.qty}</span>
            </div>
          ))}
          {returned.length > 0 && (
            <div style={{ marginTop:5, paddingTop:5, borderTop:"1px dashed #e5e7eb" }}>
              {returned.map((a, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"2px 0" }}>
                  <ActionBadge action={a.action}/>
                  <span style={{ fontFamily:"monospace", fontSize:12, color:"#9ca3af" }}>+{a.qty}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ textAlign:"center" }}>
          <span style={{ fontFamily:"monospace", fontSize:13, fontWeight:700, color: net > 0 ? "#1a7a3e" : net < 0 ? "#b45309" : "#9ca3af" }}>{net > 0 ? `+${net}` : net}</span>
        </div>
        <div style={{ textAlign:"center" }}>
          <span style={{ fontFamily:"monospace", fontSize:12, fontWeight:700, color: pos.finalStock === pos.maxStock ? "#1a7a3e" : "#b45309" }}>
            {pos.finalStock}<span style={{ color:"#d1d5db", fontWeight:400 }}>/{pos.maxStock}</span>
          </span>
        </div>
      </div>
    </div>
  );
}

function RouteSection({ route }) {
  return (
    <div style={{ borderTop:"1px solid #fde8e8" }}>
      <div style={{ display:"flex", gap:24, padding:"10px 16px", background:"#fef9f9", borderBottom:"1px solid #fde8e8", flexWrap:"wrap" }}>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", marginBottom:2 }}>DATE & TIME</div>
          <div style={{ fontSize:13, color:"#374151" }}>{route.confirmedDate} · <span style={{ fontFamily:"monospace" }}>{route.confirmedAt}</span></div>
        </div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", marginBottom:2 }}>ROUTE</div>
          {route.routeName
            ? <a href="#" onClick={e=>e.preventDefault()} style={{ fontSize:13, color:"#c8000a", fontWeight:500, textDecoration:"none", borderBottom:"1px solid #fca5a5" }}>{route.routeName}</a>
            : <span style={{ fontSize:13, color:"#9ca3af" }}>—</span>}
        </div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", marginBottom:2 }}>FILLER</div>
          <div style={{ fontSize:13, fontFamily:"monospace" }}>{route.filler}</div>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"16px 52px 1fr 200px 70px 70px", padding:"6px 0", background:"#f9fafb", borderBottom:"1px solid #f3f4f6" }}>
        <div/>
        <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af" }}>POS.</div>
        <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af" }}>PRODUCT</div>
        <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af" }}>ACTIONS</div>
        <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textAlign:"center" }}>STOCK CHANGE</div>
        <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", textAlign:"center" }}>CLOSING STOCK</div>
      </div>
      {route.positions.map((pos, i) => <PositionRow key={pos.col} pos={pos} isLast={i === route.positions.length - 1}/>)}
    </div>
  );
}

function RefillRow({ refill, isLast }) {
  const [open, setOpen] = useState(false);
  const routes = DETAIL_BY_DATE[refill.rawDate] || [];
  return (
    <div style={{ borderBottom: isLast ? "none" : "1px solid #f3f4f6" }}>
      <div onClick={() => setOpen(o => !o)} style={{ display:"grid", gridTemplateColumns:"36px 1fr 1fr 1fr 1fr 1fr 1fr", alignItems:"center", padding:"11px 0", cursor:"pointer", background: open ? "#fef2f2" : "white" }}>
        <div style={{ textAlign:"center" }}>
          <span style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:20, height:20, borderRadius:5, background: open ? "#c8000a" : "#f3f4f6", color: open ? "white" : "#6b7280", fontSize:9, fontWeight:700 }}>{open ? "▲" : "▼"}</span>
        </div>
        <div style={{ fontSize:13, fontWeight:600, fontFamily:"monospace" }}>{refill.refillNo}</div>
        <div style={{ fontSize:13, fontWeight:500 }}>{refill.date}</div>
        <div style={{ fontSize:13, color:"#374151" }}>{refill.location}</div>
        <div style={{ textAlign:"center" }}>
          <span style={{ background: refill.positionsBelow > 0 ? "#fff7ed" : "#eaf7ef", color: refill.positionsBelow > 0 ? "#b45309" : "#1a7a3e", border:`1px solid ${refill.positionsBelow > 0 ? "#fcd79a" : "#b7e4c7"}`, borderRadius:12, padding:"2px 10px", fontSize:12, fontWeight:700 }}>{refill.positionsBelow}</span>
        </div>
        <div style={{ textAlign:"center" }}>
          <span style={{ fontSize:13, fontWeight:700, fontFamily:"monospace", color: refill.stockAfter >= 80 ? "#1a7a3e" : "#b45309" }}>{refill.stockAfter.toFixed(2)}%</span>
        </div>
        <div style={{ textAlign:"center", paddingRight:16 }}>
          <span style={{ fontSize:13, fontWeight:600, fontFamily:"monospace" }}>{refill.stockBefore.toFixed(2)}%</span>
        </div>
      </div>
      {open && (
        <div style={{ background:"#fafafa" }}>
          {routes.map(r => <RouteSection key={r.routeId} route={r}/>)}
        </div>
      )}
    </div>
  );
}

function StationIcon({ type }) {
  const isF = type === "freezer";
  return (
    <div style={{ width:32, height:32, borderRadius:8, background: isF ? "#eff6ff" : "#f0fdf4", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
      {isF ? "❄" : "🗄"}
    </div>
  );
}

function RefillTab() {
  const [activeStation, setActiveStation] = useState(null); // null = market view

  const filteredVisits = activeStation
    ? VISITS.filter(v => v.stationId === activeStation)
    : VISITS;

  const activeLabel = activeStation
    ? STATIONS.find(s => s.id === activeStation)?.name
    : MARKET_NAME;

  return (
    <div style={{ display:"flex", gap:0, alignItems:"flex-start" }}>

      {/* ── Side panel ── */}
      <div style={{ width:240, flexShrink:0, background:"white", border:"1px solid #e5e7eb", borderRadius:10, marginRight:16, overflow:"hidden" }}>
        {/* Market row */}
        <div style={{ padding:"8px 6px 4px 12px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", letterSpacing:"0.08em", marginBottom:6 }}>MICRO MARKET</div>
          <button
            onClick={() => setActiveStation(null)}
            style={{ display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", padding:"8px 10px", borderRadius:8, border:"none", cursor:"pointer", background: activeStation===null ? "#fef2f2" : "transparent", textAlign:"left", fontFamily:"inherit" }}
          >
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:32, height:32, borderRadius:8, background:"#fff7f7", border:"1px solid #fca5a5", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🏪</div>
              <span style={{ fontSize:13, fontWeight:600, color: activeStation===null ? "#c8000a" : "#111827" }}>{MARKET_NAME}</span>
            </div>
            <span style={{ color:"#9ca3af", fontSize:12 }}>›</span>
          </button>
        </div>

        <div style={{ borderTop:"1px solid #f3f4f6", margin:"4px 0" }} />

        {/* Stations */}
        <div style={{ padding:"4px 6px 8px 12px" }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#9ca3af", letterSpacing:"0.08em", marginBottom:6 }}>STATIONS</div>
          {STATIONS.map(s => (
            <button
              key={s.id}
              onClick={() => setActiveStation(s.id)}
              style={{ display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", padding:"8px 10px", borderRadius:8, border:"none", cursor:"pointer", background: activeStation===s.id ? "#fef2f2" : "transparent", textAlign:"left", fontFamily:"inherit", marginBottom:2 }}
            >
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <StationIcon type={s.icon} />
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color: activeStation===s.id ? "#c8000a" : "#111827" }}>{s.name}</div>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:1 }}>{s.description}</div>
                </div>
              </div>
              <span style={{ color:"#9ca3af", fontSize:12 }}>›</span>
            </button>
          ))}
        </div>
      </div>

      {/* ── Main content ── */}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:16, flexWrap:"wrap" }}>
          <span style={{ fontSize:13, color:"#6b7280" }}>Avg. stock after refill:</span>
          <span style={{ fontSize:13, fontWeight:700 }}>{SUMMARY.avg_stocks.toFixed(1)}%</span>
          <span style={{ color:"#d1d5db", margin:"0 4px" }}>•</span>
          <span style={{ fontSize:13, color:"#6b7280" }}>Avg. filling %:</span>
          <span style={{ fontSize:13, fontWeight:700 }}>{SUMMARY.avg_fillings.toFixed(1)}%</span>
          <span style={{ color:"#d1d5db", margin:"0 4px" }}>•</span>
          <span style={{ fontSize:13, color:"#6b7280" }}>Avg. below par:</span>
          <span style={{ fontSize:13, fontWeight:700 }}>{SUMMARY.avg_no_empties.toFixed(1)}</span>
          <span style={{ color:"#d1d5db", margin:"0 4px" }}>•</span>
          <span style={{ fontSize:13, color:"#6b7280" }}>Visits:</span>
          <span style={{ fontSize:13, fontWeight:700 }}>{SUMMARY.no_of_visits}</span>
          <button style={{ marginLeft:"auto", background:"#111827", color:"white", border:"none", borderRadius:6, padding:"6px 14px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Download report</button>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#9ca3af" }}>🔍</span>
            <input placeholder="Search route" style={{ border:"1px solid #e5e7eb", borderRadius:7, padding:"7px 10px 7px 30px", fontSize:13, width:180, outline:"none", fontFamily:"inherit" }}/>
          </div>
          {["Period","Employee","Action","Source"].map(f => (
            <button key={f} style={{ border:"1px solid #e5e7eb", background:"white", borderRadius:7, padding:"7px 12px", fontSize:13, color:"#374151", cursor:"pointer", display:"flex", alignItems:"center", gap:6, fontFamily:"inherit" }}>
              {f} <span style={{ color:"#9ca3af", fontSize:10 }}>▼</span>
            </button>
          ))}
          <div style={{ marginLeft:"auto" }}>
            <button style={{ border:"1px solid #e5e7eb", background:"white", borderRadius:7, padding:"7px 10px", cursor:"pointer" }}>⬇</button>
          </div>
        </div>
        <div style={{ background:"white", borderRadius:10, border:"1px solid #e5e7eb", overflow:"hidden" }}>
          <div style={{ display:"grid", gridTemplateColumns:"36px 1fr 1fr 1fr 1fr 1fr 1fr", padding:"10px 0", borderBottom:"1px solid #f3f4f6", background:"#f9fafb" }}>
            <div/>
            {["REFILL NO.","DATE ▼","STATION","EMPTY FACINGS","STOCK","FILLING %"].map((h, i) => (
              <div key={i} style={{ fontSize:11, fontWeight:700, color:"#9ca3af", letterSpacing:"0.08em" }}>{h}</div>
            ))}
          </div>
          {filteredVisits.length === 0
            ? <div style={{ padding:40, textAlign:"center", color:"#9ca3af", fontSize:13 }}>No refills found for {activeLabel}</div>
            : filteredVisits.map((r, i) => <RefillRow key={r.id} refill={r} isLast={i === filteredVisits.length-1}/>)
          }
        </div>
        <div style={{ marginTop:12, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
          <span style={{ fontSize:11, color:"#9ca3af", fontWeight:600 }}>ACTION TYPES:</span>
          {Object.entries(ACTION_CFG).map(([k, v]) => (
            <span key={k} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#6b7280" }}>
              <span style={{ width:7, height:7, borderRadius:"50%", background:v.dot }}/>
              {v.label}
              {k==="Returned" && <span style={{ fontSize:10, color:"#9ca3af" }}>(no stock impact)</span>}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ════════════════ EVENTS DATA ════════════════
const INIT_EVENTS = [
  { id:1,  type:"Alarm",   name:"Cashless device 2", definition:"A communication error has occurred between payment peripheral and VMC. Payment may be unavailable.", counter:3, start:"2026-03-10T12:03:00Z", source:"Machine", status:"Unresolved", resolvedBy:null, resolvedAt:null, assignedTo:null },
  { id:2,  type:"Alarm",   name:"Cashless device",   definition:"A communication error has occurred between payment peripheral and VMC. Payment may be unavailable.", counter:1, start:"2026-03-10T12:03:00Z", source:"Machine", status:"Unresolved", resolvedBy:null, resolvedAt:null, assignedTo:"m.horvat" },
  { id:3,  type:"Alarm",   name:"Banknote acceptor", definition:"A communication error has occurred between payment peripheral and VMC. Payment may be unavailable.", counter:1, start:"2026-03-10T12:03:00Z", source:"Machine", status:"Resolved",   resolvedBy:"a.kovac", resolvedAt:"2026-03-10T13:22:00Z", assignedTo:"a.kovac" },
  { id:4,  type:"Alarm",   name:"Coin changer",      definition:"A communication error has occurred between payment peripheral and VMC. Payment may be unavailable.", counter:1, start:"2026-03-10T12:03:00Z", source:"Machine", status:"Unresolved", resolvedBy:null, resolvedAt:null, assignedTo:null },
  { id:5,  type:"Warning", name:"Door open",         definition:"Market door was opened outside of an active customer session.", counter:2, start:"2026-03-10T11:53:00Z", source:"Machine", status:"Unresolved", resolvedBy:null, resolvedAt:null, assignedTo:null },
  { id:6,  type:"Warning", name:"Temperature alert", definition:"Refrigeration unit temperature exceeded the safe threshold.", counter:1, start:"2026-03-10T11:53:00Z", source:"Machine", status:"Resolved", resolvedBy:"f.sesvecan", resolvedAt:"2026-03-10T12:10:00Z", assignedTo:null },

const USERS = ["a.kovac","m.horvat","f.sesvecan","i.novak","t.babic"];
const TYPE_CFG = {
  Alarm:   { color:"#991b1b", bg:"#fef2f2", border:"#fca5a5", dot:"#ef4444", icon:"⚠" },

function fmtDT(iso) {
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
const LS = { display:"block", fontSize:11, fontWeight:700, color:"#6b7280", letterSpacing:"0.07em", marginBottom:6 };

function DropMenu({ trigger, items }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div ref={ref} style={{ position:"relative", display:"inline-block" }}>
      <div onClick={() => setOpen(o => !o)}>{trigger}</div>
      {open && (
        <div style={{ position:"absolute", right:0, top:"100%", marginTop:4, zIndex:200, background:"white", border:"1px solid #e5e7eb", borderRadius:8, boxShadow:"0 4px 12px rgba(0,0,0,0.1)", overflow:"hidden", minWidth:140 }}>
          {items.map(item => (
            <button key={item.label} onClick={() => { item.onClick(); setOpen(false); }}
              style={{ display:"block", width:"100%", textAlign:"left", padding:"9px 14px", fontSize:13, background:"none", border:"none", cursor:"pointer", color: item.color || "#374151", fontFamily:"inherit" }}
              onMouseEnter={e => e.currentTarget.style.background="#f9fafb"}
              onMouseLeave={e => e.currentTarget.style.background="none"}>
              {item.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function EModal({ title, onClose, children }) {

function NewEventModal({ onClose, onSave }) {
  const [type, setType] = useState("");
  const [desc, setDesc] = useState("");
  const [asgn, setAsgn] = useState([]);
  const toggle = u => { if (asgn.includes(u)) setAsgn(asgn.filter(x => x!==u)); else if (asgn.length < 3) setAsgn([...asgn, u]); };
  const valid = type && desc.trim();
  return (
    <EModal title="New event" onClose={onClose}>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div>
          <label style={LS}>Type *</label>
          <div style={{ display:"flex", gap:8 }}>
            {["Info","Warning","Alarm"].map(t => {
              const c = TYPE_CFG[t];
              return <button key={t} onClick={() => setType(t)} style={{ flex:1, padding:"7px 0", borderRadius:8, border:`1px solid ${type===t?c.dot:"#e5e7eb"}`, background: type===t?c.bg:"white", color: type===t?c.color:"#6b7280", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>{c.icon} {t}</button>;
            })}
          </div>
        </div>
        <div>
          <label style={LS}>Description *</label>
          <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="Describe the event…" rows={3} style={{ width:"100%", border:"1px solid #e5e7eb", borderRadius:8, padding:"8px 12px", fontSize:13, fontFamily:"inherit", resize:"vertical", boxSizing:"border-box", outline:"none" }}/>
        </div>
        <div>
          <label style={LS}>Assign to <span style={{ color:"#9ca3af", fontWeight:400 }}>(max 3)</span></label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {USERS.map(u => {
              const sel = asgn.includes(u);
              return <button key={u} onClick={() => toggle(u)} style={{ padding:"4px 12px", borderRadius:20, fontSize:12, fontWeight:600, border:`1px solid ${sel?"#c8000a":"#e5e7eb"}`, background: sel?"#fef2f2":"white", color: sel?"#c8000a":"#6b7280", cursor: (!sel&&asgn.length>=3)?"not-allowed":"pointer", opacity: (!sel&&asgn.length>=3)?0.4:1, fontFamily:"inherit" }}>{u}</button>;
            })}
          </div>
          <p style={{ fontSize:11, color:"#9ca3af", margin:"6px 0 0" }}>Source → <strong>Web</strong> · Name → <strong>Web note</strong></p>
        </div>
        <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
          <button onClick={onClose} style={{ padding:"7px 16px", borderRadius:7, border:"1px solid #e5e7eb", background:"white", fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Cancel</button>
          <button onClick={() => valid && onSave({ type, desc, asgn })} style={{ padding:"7px 16px", borderRadius:7, border:"none", background: valid?"#c8000a":"#f3f4f6", color: valid?"white":"#9ca3af", fontSize:13, fontWeight:600, cursor: valid?"pointer":"default", fontFamily:"inherit" }}>Create event</button>
        </div>
      </div>
    </EModal>
  );
}

function EventsTab() {

  const [customTo, setCustomTo] = useState("");

  const periodRef = useRef();
  useEffect(() => {
    const h = e => { if (periodRef.current && !periodRef.current.contains(e.target)) setPeriodOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  const [page, setPage] = useState(1);

    if (statusFilter === "Resolved" && e.status !== "Resolved") return false;
    if (statusFilter === "Not resolved" && e.status !== "Unresolved") return false;
    if (sourceFilter !== "All" && e.source !== sourceFilter) return false;
    if (nameFilter !== "All" && e.name !== nameFilter) return false;
    return true;
  });

  const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
  const paginated = filtered.slice((page-1)*pageSize, page*pageSize);

  const hasFilters = typeFilter.length > 0 || statusFilter !== "All" || sourceFilter !== "All" || nameFilter !== "All";

        })}
        {hasFilters && <button onClick={reset} style={{ marginLeft:8, fontSize:12, color:"#9ca3af", background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", textDecoration:"underline" }}>Reset filters</button>}

                  onMouseEnter={e => e.currentTarget.style.background="#f9fafb"}

          Rows per page:
          <select value={pageSize} onChange={e => { setPageSize(Number(e.target.value)); setPage(1); }} style={{ border:"1px solid #e5e7eb", borderRadius:6, padding:"4px 8px", fontSize:13, fontFamily:"inherit" }}>
            {[10,20,50,100].map(n => <option key={n}>{n}</option>)}
          </select>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
          <button onClick={() => setPage(p => Math.max(1,p-1))} disabled={page===1} style={{ padding:"5px 10px", borderRadius:6, border:"1px solid #e5e7eb", background:"white", cursor: page===1?"default":"pointer", color: page===1?"#d1d5db":"#374151", fontSize:13 }}>‹</button>
          {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1).map((p,i,arr)=>(
            <span key={p}>
              {i>0&&arr[i-1]!==p-1&&<span style={{ color:"#9ca3af", padding:"0 4px" }}>…</span>}
              <button onClick={() => setPage(p)} style={{ padding:"5px 10px", borderRadius:6, border:`1px solid ${p===page?"#c8000a":"#e5e7eb"}`, background: p===page?"#fef2f2":"white", color: p===page?"#c8000a":"#374151", fontWeight: p===page?700:400, cursor:"pointer", fontSize:13, fontFamily:"inherit" }}>{p}</button>
            </span>
          ))}
          <button onClick={() => setPage(p => Math.min(totalPages,p+1))} disabled={page===totalPages} style={{ padding:"5px 10px", borderRadius:6, border:"1px solid #e5e7eb", background:"white", cursor: page===totalPages?"default":"pointer", color: page===totalPages?"#d1d5db":"#374151", fontSize:13 }}>›</button>
        </div>
        <div style={{ fontSize:13, color:"#9ca3af" }}>Page {page} of {totalPages}</div>
      </div>

      {assignModal && <AssignModal event={assignModal} onClose={() => setAssignModal(null)} onSave={u => { setEvents(p => p.map(e => e.id===assignModal.id?{...e,assignedTo:u}:e)); setAssignModal(null); }}/>}
      {resolveModal && <ResolveModal event={resolveModal} onClose={() => setResolveModal(null)} onSave={() => { setEvents(p => p.map(e => e.id===resolveModal.id?{...e,status:"Resolved",resolvedBy:"name@mail.com",resolvedAt:new Date().toISOString()}:e)); setResolveModal(null); }}/>}
      {newModal && <NewEventModal onClose={() => setNewModal(false)} onSave={({type,desc,asgn}) => { setEvents(p => [{id:Date.now(),type,name:"Web note",definition:desc,counter:1,start:new Date().toISOString(),source:"Web",status:"Unresolved",resolvedBy:null,resolvedAt:null,assignedTo:asgn.length>0?asgn.join(", "):null},...p]); setNewModal(false); }}/>}
    </div>
  );
}
